# Strict gold-relevance query set — human-audited precision, no self-grading.
#
# WHY THIS EXISTS (2026-07-11): the main eval's precision@5 (reports/model_eval_*)
# is PROPERTY-based — an item counts as relevant if it satisfies the query's
# `must` constraints (garment_type/gender/colour/occasion). Its own legend calls
# that "a FLOOR on true relevance, not a ceiling": a maxi dress satisfies
# must={garment_type: dress} for a "bodycon dress" query and self-grades as a
# hit. This gold set closes that gap with per-item HAND labels.
#
# LABELING RUBRIC (applied per retrieved item, binary relevant/irrelevant):
#   An item is RELEVANT only if ALL of the following hold, judged from its real
#   product name + attributes (not from the checker's property fields):
#     1. Garment TYPE matches exactly (a kurta is not a kurta-set; a gown is a
#        dress only if the query didn't name a different silhouette).
#     2. SILHOUETTE/STYLE matches when the query names one — bodycon != maxi,
#        A-line != straight, slim-fit != oversized. "Unstated in the product
#        name AND not contradicted" counts as a match only when the item's
#        name/desc gives no opposing silhouette signal.
#     3. GENDER matches (unisex acceptable for unisex-plausible garments).
#     4. COLOUR matches when the query names one (colour-family tolerance:
#        wine/maroon/burgundy are one family; black is not navy).
#     5. OCCASION REGISTER is plausible when the query names an occasion —
#        NOT just "is it ethnic/western" but does its FORMALITY/EMBELLISHMENT
#        match: a heavy embellished/velvet/bridal-weight item is a MISS for
#        haldi/mehendi (want light/floral/cotton) even though it's correctly
#        ethnic; a plain cotton item is a MISS for sangeet/reception (want
#        embellished) even though it's correctly ethnic. A thermal pyjama is
#        never sangeet-wear regardless of type match.
#     6. BUDGET respected when the query names one (price_inr <= stated cap).
#   Anything else — including "close but different silhouette" — is a MISS.
#
# CATEGORIES (added 2026-07-11 for per-category before/after reporting):
#   literal          — plain garment+colour(+budget), no occasion/style nuance
#   style            — silhouette/style word is the crux (bodycon vs maxi etc.)
#   occasion         — occasion register must be respected (includes the
#                       ADVERSARIAL register probes occ_adv_* added 2026-07-11,
#                       which specifically test formality/embellishment
#                       mismatches — see rubric point 5 — not just ethnic/
#                       western gender-of-garment).
#   multi_attribute  — colour + style/type + occasion + budget stacked in one
#                       query (added 2026-07-11); tests whether constraints
#                       dilute each other instead of jointly narrowing.
#   (couple/body_type composition-quality categories are NOT covered by this
#   single-item strict eval — they're measured by eval_model.py's gates/judge
#   stages against the main fixture; see reports/model_eval_*.md.)
#
# Labels live in eval/fixtures/strict_gold_labels.yaml keyed by
# (query_id, article_id). Labeled by Claude (Fable 5) reading product names,
# types, colours and descriptions — auditable line-by-line, and GG can
# overturn any label; the label file records the retrieval snapshot + commit
# SHA it graded. Scored by scripts/eval_strict.py, which FAILS on unlabeled
# items rather than guessing (the checker must never grade itself).
