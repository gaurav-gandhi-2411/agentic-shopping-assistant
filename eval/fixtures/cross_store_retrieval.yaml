# Cross-store retrieval eval fixture — 36 text queries
#
# Fields per case:
#   id:                    unique identifier
#   query:                 free-text query sent to HybridRetriever
#   expected_product_types: list of product_type_name values (exact catalogue strings)
#                           that count as a relevant hit; union-matched (OR logic)
#   expected_colours:      optional list of colour_group_name values; if present, a
#                          hit must ALSO match one of these colours to be relevant
#   min_relevant:          minimum number of relevant hits expected in top-10
#                          (soft expectation for documentation; not a pass/fail gate)
#   notes:                 free-text rationale
#
# All product_type_name values verified against data/processed/unified/catalogue.parquet.
# Stores covered per query noted in comments (snitch, myntra, flipkart, fashor, virgio, powerlook).

queries:

  # ── Western women ─────────────────────────────────────────────────────────

  - id: CSR-01
    query: "black dress women"
    expected_product_types:
      - Dress
      - Dresses
      - Topwear
      - Fashion
    min_relevant: 5
    notes: "Cross-store: myntra(Dress), fashor(Dresses), virgio(Dress). flipkart(Topwear) is a valid broad type."

  - id: CSR-02
    query: "midi dress floral"
