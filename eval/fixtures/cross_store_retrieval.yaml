      - Shirt
      - Blouse
    expected_colours:
      - Pink
      - Light Pink
      - Baby Pink
      - Peach
      - Light Peach
    min_relevant: 3
    notes: >
      Colour filter deliberately retained despite only myntra populating colour_group_name.
