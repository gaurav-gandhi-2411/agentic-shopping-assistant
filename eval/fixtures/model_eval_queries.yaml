# eval/fixtures/model_eval_queries.yaml
#
# Pre-launch synthetic eval query set for the Agentic Shopping Assistant's
# intent-parsing / retrieval / outfit-composition stack. Complementary to
# scripts/eval_queries.yaml (57 queries, older H&M-catalogue-era schema) —
# no query text is duplicated between the two files.
#
# Sourced wherever possible from EXISTING labelled test data rather than
# invented from scratch:
#   - tests/test_intent_parser.py           -> search (gender/garment/colour/budget)
#   - src/agents/outfit/occasions.py +
#     src/agents/intent_parser.py _OCCASION_MAP -> occasion (12 slugs x synonyms)
#   - tests/test_body_type.py,
#     tests/test_body_type_bare_statement.py -> body_type
#   - tests/test_partner_styling.py
#     detect_partner_intent positives        -> couple
#   - scripts/browser_proof.py PB_NOVELTY_RE  -> adversarial novelty vocabulary
#
# ---------------------------------------------------------------------------
# expected_intent fields are exactly IntentV1's real fields (see
# src/agents/intent_parser.py's IntentV1 dataclass) — a subset is used here
# (garment_type, gender, colour, occasion, budget_max_inr, body_type,
# body_modifiers, is_product_query); store_filter/raw_query/
# wants_body_type_guidance are not scored by this fixture set.
#
# gates.checks vocabulary — exactly the 4 checks the task brief specified,
# CONFIRMED implemented by reading scripts/eval_model.py's
# evaluate_gate_checks (built concurrently against this same fixture):
#   gender_pure        - every composed/retrieved item matches the resolved
#                        look gender (no cross-gender leak)
#   budget_respected   - total look price (or item price) <= budget_inr
#   no_novelty         - no item title matches PB_NOVELTY_RE vocabulary
#                        (piano, guitar, novelty, quirky, costume)
#   suppression_honest - an empty/suppressed slot is reported honestly (never
#                        fabricated), whether or not the gap was pre-flagged
#                        via data_ceiling_tags
#
# The adversarial section below covers two additional bug classes the task
# brief asked for (kids-item leak, cross-gender ethnic composition) that have
# NO dedicated check in the harness today — there is no "no_kids_leak" or
# "ethnic_gender_consistent" check implemented, and the relevance schema has
# no "must_not" to express exclusion at the retrieval stage either. Rather
# than reference a check name the harness will silently no-op, those entries
# use gender_pure + suppression_honest (the closest implemented proxies) and
# say so explicitly in an inline comment at each bucket — flagged here as a
# genuine gap for a follow-up, not silently assumed away.
#
# data_ceiling_tags vocabulary (best-effort annotation, NOT verified against
# live per-store inventory counts — see src/agents/outfit/composer.py's
# _suppression_reason, which deliberately never quotes a live count either):
#   womens_footwear, mens_occasionwear, jewellery
#
# Two real intent_parser.py gaps were discovered while building this fixture
# (out of this task's scope — fixtures/tests only — flagged for a follow-up
# fix; see the ADVERSARIAL section comment below for detail):
#   BUG1 - "lehenga" plural ("lehengas") is never extracted as a garment_type
#          (adversarial_031).
#   BUG2 - an ethnic-women-marker noun (kurta/kurti/saree/lehenga/dupatta/
#          anarkali/sharara/palazzo) in the same query as an explicit
#          "men's"/"for men" signal silently overrides gender to "women".
#
# checks keys used by relevance blocks:
#   must    - ALL properties must hold for an item to count as relevant
#             (gain 1 for NDCG if must-only, gain 2 if must+graded both hold)
#   graded  - optional bonus properties (see must, above)
# ---------------------------------------------------------------------------

