      gender: "men"
      store: "flipkart"
      price_inr: 1363.0
    expected_match: false

  - id: "HN-04"
    label: "Fusion Crest shirt (snitch/men) vs Fusion football shoes (flipkart/men)"
    notes: >
      'fusion' shared, same gender (men), but Shirts vs Men's Footwear and
      completely different product. Should be rejected on product_type + title.
    query_item:
      article_id: "8214843261090"
      prod_name: "Fusion Crest Brown Shirt"
