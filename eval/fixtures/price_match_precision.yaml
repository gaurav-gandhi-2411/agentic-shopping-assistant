# Price-match precision eval fixtures — Phase D
#
# HARD NEGATIVES: confusable brand-collision pairs from the real unified catalogue.
# The matcher MUST reject all of these (different products sharing a brand token).
#
# TRUE POSITIVES: synthetic cross-store pairs that represent what a genuine
# cross-listing looks like (same brand, near-identical title, same type+gender,
# differing store/price).  These are eval fixtures ONLY — they are NOT injected
# into the live catalogue.  They verify the matcher can fire when a real
# cross-listing exists (recall sanity check, so the rule is not a trivial reject-all).
#
# GATE: precision >= 0.95, recall > 0 (at least one true positive caught).

hard_negatives:
  - id: "HN-01"
    label: "Free Authority hooded sweatshirt (myntra/women) vs vest (flipkart/men)"
    notes: >
      Same brand token 'free authority' but Shirt vs Innerwear and Swimwear,
      women vs men, and completely different titles. Should be rejected on
      product_type mismatch alone (+ gender + title).
    query_item:
      article_id: "16724768"
      prod_name: "Free Authority Women Olive Green Captain America Printed Hooded Sweatshirt"
      product_type_name: "Shirt"
      gender: "women"
      store: "myntra"
      price_inr: 1699.0
    candidate_item:
      article_id: "c8cccb65-d8b9-582f-a37e-3f88b00d136f"
      prod_name: "Free Authority Men Vest"
      product_type_name: "Innerwear and Swimwear"
      gender: "men"
      store: "flipkart"
      price_inr: 424.0
    expected_match: false

  - id: "HN-02"
