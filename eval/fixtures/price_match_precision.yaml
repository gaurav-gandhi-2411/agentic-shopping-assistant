    notes: >
      Brand prefix 'fusion' shared but Top vs Men's Footwear, women vs men,
      and company names differ (Fusion Beats vs Fusion/Vector). Should be
      rejected on product_type + gender + title.
    query_item:
      article_id: "7485587"
      prod_name: "Fusion Beats Women Black Printed Top"
      product_type_name: "Top"
      gender: "women"
      store: "myntra"
      price_inr: 1999.0
    candidate_item:
      article_id: "7c142e88-2d96-5fc2-a1e8-6f8979b74063"
      prod_name: "Fusion Football Shoes For Men (Red)"
      product_type_name: "Men's Footwear"
      gender: "men"
      store: "flipkart"
      price_inr: 480.0
    expected_match: false

  - id: "HN-03"
    label: "Next One jeans (myntra/women) vs Next Skin underwear (flipkart/men)"
    notes: >
      'next' prefix shared but Jeans vs Innerwear and Swimwear, women vs men,
