      title must match — they do. Both stores are multi-brand (myntra, flipkart)
      so brand extraction works correctly.
    query_item:
      article_id: "SYNTHETIC-TP03-A"
      prod_name: "GlobalBrand Men Regular Fit Cargo Pants"
      product_type_name: "Trousers"
      gender: "unknown"
