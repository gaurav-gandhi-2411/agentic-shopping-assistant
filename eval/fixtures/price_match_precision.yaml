true_positives:
  - id: "TP-01"
    label: "Synthetic: same brand/title/type/gender, two stores, different price"
    notes: >
      Simulates what a genuine cross-store listing of the exact same product
      looks like. 'GlobalBrand Men Slim Fit Cotton Shirt' available at two
      imaginary stores with a small price difference. The matcher should accept.
      These items are NOT in the live catalogue.
    query_item:
      article_id: "SYNTHETIC-TP01-A"
      prod_name: "GlobalBrand Men Slim Fit Cotton Shirt"
      product_type_name: "Shirts"
      gender: "men"
      store: "myntra"
      price_inr: 1499.0
      pdp_handle: "shirts/globalbrand/slim-fit-cotton-shirt/SYNTHETIC-TP01-A/buy"
    candidate_item:
      article_id: "SYNTHETIC-TP01-B"
      prod_name: "GlobalBrand Men Slim Fit Cotton Shirt"
      product_type_name: "Shirts"
      gender: "men"
      store: "flipkart"
      price_inr: 1299.0
      pdp_handle: "https://www.flipkart.com/globalbrand-slim-fit-shirt"
    expected_match: true

