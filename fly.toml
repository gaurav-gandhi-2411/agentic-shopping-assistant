# fly.toml — Fly.io configuration for the Shopping Assistant API
# Replace "shopping-assistant" with your actual unique app name after running
# `fly launch --no-deploy --copy-config`.

app = "shopping-assistant"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  LLM_PROVIDER = "groq"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
