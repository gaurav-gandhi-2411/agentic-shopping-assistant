name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy .
        continue-on-error: true

      - name: Test
        run: pytest -m "not requires_ollama and not requires_index" -v

      - name: Security audit (pip-audit)
        run: pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build

      - name: Security audit (npm audit)
        run: cd frontend && npm audit --audit-level=moderate
        continue-on-error: true

  eval:
    runs-on: ubuntu-latest
    continue-on-error: true   # Ollama not available in standard CI; informational only
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval suite (requires Ollama)
        run: python -m eval.run --provider ollama
        continue-on-error: true
        # Set OLLAMA_HOST if your Ollama instance is not on localhost:11434
