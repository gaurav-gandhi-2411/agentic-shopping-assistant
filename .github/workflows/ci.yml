name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for WIF auth (google-github-actions/auth)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install lint/type-check tools
        run: pip install ruff mypy
        # Neither is in requirements.txt (that's runtime deps only) — this step was
        # missing entirely, so "Lint (ruff)" has been hard-failing CI with
        # "ruff: command not found" since before this change; only ever worked
        # locally because dev machines have them installed globally.

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy .
        continue-on-error: true

      - name: Authenticate to GCP (read-only, index bucket only)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Download unified index (for requires_index tests)
        run: |
          mkdir -p data/processed/unified data/processed/clip/unified
          gcloud storage cp -r 'gs://asa-demo-indices/unified/unified/*' data/processed/unified/
          gcloud storage cp gs://asa-demo-indices/unified/clip/unified/clip_article_ids.npy data/processed/clip/unified/
          # tests/test_retrieval.py, test_tools.py, and the conftest.py requires_index
          # sentinel (data/processed/dense.faiss) read the flat data/processed/ path,
          # not data/processed/unified/ — same index files, just also copied flat.
          cp data/processed/unified/* data/processed/

      - name: Test
        run: pytest -m "not requires_ollama" -v

      - name: Security audit (pip-audit)
        run: pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build

      - name: Security audit (npm audit)
        run: cd frontend && npm audit --audit-level=moderate
        continue-on-error: true

  eval:
    runs-on: ubuntu-latest
    needs: backend
    permissions:
      contents: read
      id-token: write   # required for WIF auth (google-github-actions/auth)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to GCP (read-only, index bucket only)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Download unified index
        run: |
          mkdir -p data/processed/unified
          gcloud storage cp -r 'gs://asa-demo-indices/unified/unified/*' data/processed/unified/

      - name: Relevance regression gate
        run: python scripts/eval_gate.py
        # Deterministic (zero LLM calls: intent/r1/gates) + hand-audited strict gold
        # eval — see scripts/eval_gate.py for thresholds. Replaces the old
        # `python -m eval.run --provider ollama` step, which needed Ollama (never
        # available in GitHub-hosted runners) and only ran with continue-on-error,
        # i.e. never actually gated anything.
