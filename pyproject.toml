[tool.pytest.ini_options]
markers = [
    "requires_ollama: marks tests that require a running Ollama instance (deselect with -m 'not requires_ollama')",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_return_any = false
